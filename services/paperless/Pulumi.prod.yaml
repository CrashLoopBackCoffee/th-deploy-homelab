environment:
  - global/global-prod
  - kubernetes/kubeconfig-prod
  - paperless/paperless-prod

config:
  paperless:config:
    entraid:
      client-id: a02dcdca-dd0d-4b11-8a92-e7c8307ad547
      client-secret:
        secure: AAABAM21YdSLrpU9qebitEnlC8/9G1C/jqWB593x8iybBZyK/xASE8rh7/bqQzkPztqxxLUbyKiKPA9iaH3lpwkkrS9uV9Mx
    google:
      client-id: 153248760938-p7v8p1m2vtvsj8ek8jc4qoubgjgdh8rs.apps.googleusercontent.com
      client-secret:
        secure: AAABAHNJhKTQyeUviwkgC8LH8PSe71ZlqYwrjjH978KnZeJhNdbgjTl+bBEnw5Gi/sLrULpnKnMv2sdCR5iBuMoffg==
    mail:
      client-id: 153248760938-k1ff8a6mta5k20l05keg46klsn32stue.apps.googleusercontent.com
      client-secret:
        secure: AAABADJWFhyDQEeCnOudImXSDQmZT38y5lHhkieOIOjtGGraR8TAtdHm7dCpP6yKeOuc8hmVzj91W4uj272+EbOsKQ==
    paperless:
      # renovate: datasource=github-releases packageName=paperless-ngx/paperless-ngx versioning=semver
      version: 2.20.15
      consume-server: synology.tobiash.net
      consume-share: /volume2/paperless
    backup:
      # renovate: datasource=docker packageName=ghcr.io/crashloopbackcoffee/restic-rclone versioning=docker
      restic-rclone-version: 0.18.0-1.70.3
      # renovate: datasource=github-releases packageName=kubernetes/kubernetes versioning=semver
      kubectl-version: 1.36.1
      repository-path: paperless
      schedule: "0 2 * * *"
      retention-daily: 7
      retention-weekly: 4
      retention-monthly: 6
      # Secondary IDrive E2 (S3) backup target
      idrive-enabled: true
      idrive-bucket: restic-paperless
    postgres:
      # renovate: datasource=endoflife-date packageName=postgresql extractVersion=^(?<version>\d+) versioning=loose
      version: 18
    redis:
      # renovate: datasource=github-releases packageName=redis/redis versioning=semver
      version: 8.6.3
    tika:
      # renovate: datasource=docker packageName=registry-1.docker.io/apache/tika versioning=loose
      version: 4.0.0-SNAPSHOT-full
    gotenberg:
      # renovate: datasource=github-releases packageName=gotenberg/gotenberg versioning=semver
      version: 8.32.0
    resources:
      paperless:
        cpu: 10m
        memory: 2048Mi
      redis:
        cpu: 10m
        memory: 100Mi
      tika:
        cpu: 10m
        memory: 233Mi
      gotenberg:
        cpu: 10m
        memory: 233Mi
      restic:
        cpu: 10m
        memory: 100Mi
