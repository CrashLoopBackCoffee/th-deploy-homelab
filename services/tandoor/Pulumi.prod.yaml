environment:
  - global/global-prod
  - kubernetes/kubeconfig-prod
  - kubernetes/postgres-backup-prod

config:
  tandoor:config:
    tandoor:
      # renovate: datasource=github-releases packageName=TandoorRecipes/recipes versioning=semver
      version: 2.6.9
      hostname: tandoor.tobiash.net
      resources:
        cpu: 10m
        memory: 804Mi
    postgres:
      # renovate: datasource=endoflife-date packageName=postgresql extractVersion=^(?<version>\d+) versioning=loose
      version: 18
      backup:
        cron-schedule: "0 0 0 * * *"
